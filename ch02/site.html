<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Login</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background-color:#f4f6f9;

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:white;
    padding:40px;
    width:320px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.login-box h2{
    text-align:center;
    margin-bottom:30px;
}

.input-group{
    margin-bottom:20px;
}

.input-group label{
    display:block;
    margin-bottom:5px;
    font-size:14px;
}

.input-group input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:14px;
}

.login-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:5px;
    background-color:#4CAF50;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.login-btn:hover{
    background-color:#43a047;
}
</style>

</head>

<body>

<div class="login-box">

<h2>로그인</h2>

<form>

<div class="input-group">
<label>아이디</label>
<input type="text" placeholder="아이디 입력">
</div>

<div class="input-group">
<label>비밀번호</label>
<input type="password" placeholder="비밀번호 입력">
</div>

<button class="login-btn" type="submit">로그인</button>

</form>

</div>

</body>
</html>
